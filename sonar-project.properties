# Project identification
sonar.projectKey=somasekhara-associates
sonar.projectName=Somasekhara & Associates
sonar.projectVersion=1.0.0

# Source files
sonar.sources=src
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,src/assets/**,src/constants/**

# Test files
sonar.tests=src/test
sonar.test.inclusions=src/test/**/*.test.jsx,src/test/**/*.test.js

# Coverage report (generated by: npm run test:coverage)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Language
sonar.language=js
sonar.sourceEncoding=UTF-8
